name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Disable Host Key Checking
        run: |
          mkdir -p ~/.ssh
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null\n" >> ~/.ssh/config

      - name: Notify Deploy Started
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')
          
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"🚀 Deploy Started\", \"description\": \"Deploying to server (all accounts)...\", \"color\": 16776960, \"fields\": [{\"name\": \"Commit\", \"value\": \"[\`${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) ${COMMIT_MSG}\", \"inline\": false}, {\"name\": \"Author\", \"value\": \"${AUTHOR}\", \"inline\": true}, {\"name\": \"Workflow\", \"value\": \"[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Deploy to Server (143.198.212.100)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ssh root@143.198.212.100 'cd ~/advanced-discord-owo-tool-farm && git pull origin main && docker system prune -af && DOCKER_BUILDKIT=0 docker-compose up -d --build --force-recreate && docker image prune -f'

      - name: Send Final Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')
          
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"🎉 Deploy Complete\", \"description\": \"Server updated - all 3 accounts running!\", \"color\": 5763719, \"fields\": [{\"name\": \"📝 Commit\", \"value\": \"[\`${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) ${COMMIT_MSG}\", \"inline\": false}, {\"name\": \"👤 Author\", \"value\": \"${AUTHOR}\", \"inline\": true}, {\"name\": \"🔗 Workflow\", \"value\": \"[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}, {\"name\": \"📊 Server\", \"value\": \"143.198.212.100 (3 accounts)\", \"inline\": false}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"footer\": {\"text\": \"GitHub Actions\"}}]}" \
            "$DISCORD_WEBHOOK_URL"
