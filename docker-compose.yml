version: '3.8'

services:
  owo-farm:
    build: .
    container_name: owo-farm-bot
    restart: unless-stopped
    volumes:
      # Data persist across rebuilds
      - ./data:/app/data
      # Logs persist across rebuilds
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - TZ=Asia/Ho_Chi_Minh
    stdin_open: true
    tty: true
